name: API Regression Nightly

on:
#   schedule:
#     - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch: {}

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run regression tests + reports
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: |
          mkdir -p reports
          python -m pytest -m "not performance" \
            --junitxml=reports/junit-regression.xml \
            --html=reports/regression-report.html \
            --self-contained-html

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: reports/